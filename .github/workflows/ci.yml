name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0   # full history for accurate gitCommitCount() in build.gradle.kts

      # ── JDK 17 ────────────────────────────────────────────────────────────────
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      # ── Android SDK + NDK ─────────────────────────────────────────────────────
      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;30.0.14904198" >/dev/null

      # ── Cache: CMake ExternalProject deps (OpenSSL + LZ4) ────────────────────
      # Built from source by CMake on first run; cached by CMakeLists.txt hash.
      - name: Cache CMake deps
        uses: actions/cache@v5
        with:
          path: app/.cxx
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('app/src/main/cpp/CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-

      # ── Cache: Gradle ──────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Build debug APK ────────────────────────────────────────────────────────
      - name: Build debug
        run: ./gradlew assembleDebug

      # ── Lint ───────────────────────────────────────────────────────────────────
      - name: Lint
        run: ./gradlew lintDebug

      - name: Upload lint report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

      # ── Unit tests ─────────────────────────────────────────────────────────────
      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest/
