name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # full history for accurate gitCommitCount() in build.gradle.kts

      # ── JDK 17 ────────────────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Android SDK + NDK ─────────────────────────────────────────────────────
      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;30.0.14904198" >/dev/null

      # ── Cache: prebuilt OpenSSL + LZ4 ─────────────────────────────────────────
      - name: Cache prebuilt native deps
        id: cache-prebuilt
        uses: actions/cache@v4
        with:
          path: prebuilt/
          key: prebuilt-${{ runner.os }}-${{ hashFiles('scripts/build-deps-android.sh') }}

      - name: Install build tools (Perl modules for OpenSSL Configure)
        if: steps.cache-prebuilt.outputs.cache-hit != 'true'
        run: sudo apt-get install -y perl perl-modules

      - name: Build prebuilt deps (OpenSSL + LZ4)
        if: steps.cache-prebuilt.outputs.cache-hit != 'true'
        run: ANDROID_NDK="$ANDROID_HOME/ndk/30.0.14904198" ./scripts/build-deps-android.sh

      # ── Cache: Gradle ──────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Build debug APK ────────────────────────────────────────────────────────
      - name: Build debug
        run: ./gradlew assembleDebug

      # ── Lint ───────────────────────────────────────────────────────────────────
      - name: Lint
        run: ./gradlew lintDebug

      - name: Upload lint report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

      # ── Unit tests ─────────────────────────────────────────────────────────────
      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest/
