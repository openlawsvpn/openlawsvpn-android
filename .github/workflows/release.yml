name: Release

# Trigger: push a version tag (e.g. v0.2.0) — or run manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # required to create GitHub Releases and upload assets

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout (recursive: pulls openlawsvpn + openvpn3-core submodules) ──
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # ── JDK 17 ────────────────────────────────────────────────────────────
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      # ── Android SDK + NDK ─────────────────────────────────────────────────
      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;30.0.14904198" >/dev/null

      # ── Cache: CMake ExternalProject deps (OpenSSL + LZ4) ────────────────────
      # Built from source by CMake on first run; cached by CMakeLists.txt hash.
      - name: Cache CMake deps
        uses: actions/cache@v5
        with:
          path: app/.cxx
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('app/src/main/cpp/CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-

      # ── Cache: Gradle ──────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Decode release keystore ────────────────────────────────────────────
      # Store the .keystore file as a base64-encoded GitHub secret:
      #   base64 -w0 openlawsvpn-release.keystore | xclip
      # Then add as secret RELEASE_KEYSTORE_BASE64 in repo Settings → Secrets.
      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d \
            > "$RUNNER_TEMP/openlawsvpn-release.keystore"

      # ── Build release AAB + APK ────────────────────────────────────────────
      # KEYSTORE_PATH  — plain path to the file we just decoded; not a secret.
      # KEY_ALIAS      — just a name; not a secret.
      # KEY_PASSWORD   — PKCS12: must equal KEYSTORE_PASSWORD (one password for store + key).
      - name: Build release
        env:
          KEYSTORE_PATH:     ${{ runner.temp }}/openlawsvpn-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         openlawsvpn
          KEY_PASSWORD:      ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew bundleRelease assembleRelease

      # ── Upload build artifacts ─────────────────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v7
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      # ── Create GitHub Release (tag pushes only) ────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true
