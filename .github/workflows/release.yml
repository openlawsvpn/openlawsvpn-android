name: Release

# Trigger: push a version tag (e.g. v0.2.0) — or run manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout (recursive: pulls openlawsvpn + openvpn3-core submodules) ──
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── JDK 17 ────────────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Android SDK + NDK ─────────────────────────────────────────────────
      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;30.0.14904198" >/dev/null

      # ── Cache: prebuilt OpenSSL + LZ4 ─────────────────────────────────────
      # Key includes the build script and version pins so a cache miss triggers
      # a fresh cross-compile.
      - name: Cache prebuilt native deps
        id: cache-prebuilt
        uses: actions/cache@v4
        with:
          path: prebuilt/
          key: prebuilt-${{ runner.os }}-${{ hashFiles('scripts/build-deps-android.sh') }}

      - name: Install build tools (Perl modules for OpenSSL Configure)
        if: steps.cache-prebuilt.outputs.cache-hit != 'true'
        run: sudo apt-get install -y perl perl-modules

      - name: Build prebuilt deps (OpenSSL + LZ4)
        if: steps.cache-prebuilt.outputs.cache-hit != 'true'
        run: ANDROID_NDK="$ANDROID_HOME/ndk/30.0.14904198" ./scripts/build-deps-android.sh

      # ── Cache: Gradle ──────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Decode release keystore ────────────────────────────────────────────
      # Store the .keystore file as a base64-encoded GitHub secret:
      #   base64 -w0 openlawsvpn-release.keystore | xclip
      # Then add as secret RELEASE_KEYSTORE_BASE64 in repo Settings → Secrets.
      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d \
            > "$RUNNER_TEMP/openlawsvpn-release.keystore"

      # ── Build release AAB + APK ────────────────────────────────────────────
      # KEYSTORE_PATH  — plain path to the file we just decoded; not a secret.
      # KEY_ALIAS      — just a name; not a secret.
      # KEY_PASSWORD   — PKCS12: must equal KEYSTORE_PASSWORD (one password for store + key).
      - name: Build release
        env:
          KEYSTORE_PATH:     ${{ runner.temp }}/openlawsvpn-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         openlawsvpn
          KEY_PASSWORD:      ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew bundleRelease assembleRelease

      # ── Upload build artifacts ─────────────────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      # ── Create GitHub Release (tag pushes only) ────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true
