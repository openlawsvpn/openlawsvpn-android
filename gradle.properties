org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=false
kotlin.code.style=official
# Suppress "excludeLibraryComponentsFromConstraints" sync warning (large-project perf hint)
android.generateSyncIssueWhenLibraryConstraintsAreEnabled=false
# Keep explicit KGP plugin (id("org.jetbrains.kotlin.android")) working.
# builtInKotlin=true (AGP 9 default) would register the kotlin extension internally,
# conflicting with the separately-applied KGP. Stays false until we drop the explicit plugin.
android.builtInKotlin=false
